name: Release

on:
  push:
    tags:
      - "v*"

env:
  JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

jobs:
  release:
    name: Build & Release
    runs-on: [self-hosted, vps]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        run: |
          echo "JAVA_HOME=$JAVA_HOME" >> "$GITHUB_ENV"
          echo "$JAVA_HOME/bin" >> "$GITHUB_PATH"
          java -version

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Build plugin
        run: ./gradlew buildPlugin --no-daemon

      - name: Find plugin ZIP
        id: find_zip
        run: |
          ZIP=$(ls build/distributions/*.zip | head -1)
          echo "zip_path=$ZIP" >> "$GITHUB_OUTPUT"
          echo "zip_name=$(basename $ZIP)" >> "$GITHUB_OUTPUT"
          echo "Built: $ZIP"

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          # Simple changelog: list commits since last tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${VERSION}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline "${PREV_TAG}..HEAD" | head -20)
          else
            COMMITS=$(git log --oneline -10)
          fi
          echo "CHANGES<<EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "${{ steps.find_zip.outputs.zip_path }}" \
            --title "ABL Language Support ${{ github.ref_name }}" \
            --notes "## Installation

          1. Dans IntelliJ IDEA : **Settings → Plugins → ⚙️ → Install Plugin from Disk...**
          2. Sélectionner le fichier \`${{ steps.find_zip.outputs.zip_name }}\`
          3. Redémarrer IntelliJ

          ## Changements
          \`\`\`
          ${{ steps.changelog.outputs.CHANGES }}
          \`\`\`" \
            --repo "${{ github.repository }}"
