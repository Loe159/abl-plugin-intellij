name: Sync GitHub Issue → Paperclip

on:
  issues:
    types: [opened, reopened]

env:
  PAPERCLIP_API: http://localhost:3100/api
  COMPANY_ID: 01420bc5-12ec-4b56-bf6a-2d420be0b2d5
  PROJECT_ID: cefe7156-21f5-4e8c-bf50-ee9101ccad2c
  # ABL Product Manager — entry point for GitHub-sourced issues.
  # PM triages then delegates: Engineer → Tester → Reviewer → PR Agent.
  PM_AGENT_ID: c961ca24-0a97-43ff-9d36-daffb7c5dab3

jobs:
  sync:
    runs-on: [self-hosted, vps]
    steps:
      - name: Create Paperclip issue → ABL Product Manager
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PAYLOAD=$(jq -n \
            --arg title "${{ github.event.issue.title }}" \
            --arg num   "${{ github.event.issue.number }}" \
            --arg url   "${{ github.event.issue.html_url }}" \
            --arg body  "${{ github.event.issue.body }}" \
            --arg agent "$PM_AGENT_ID" \
            --arg proj  "$PROJECT_ID" \
            '{
              title: $title,
              description: ("GitHub #" + $num + "\n\n" + $url + "\n\n---\n" + $body),
              projectId: $proj,
              assigneeAgentId: $agent,
              priority: "medium",
              status: "backlog"
            }')

          RESP=$(curl -s -X POST \
            "$PAPERCLIP_API/companies/$COMPANY_ID/issues" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          IDENT=$(echo "$RESP" | jq -r '.identifier // empty')
          if [ -z "$IDENT" ]; then
            echo "::error::Paperclip sync failed: $RESP"
            exit 1
          fi
          echo "Paperclip issue created: $IDENT"

          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "🤖 Paperclip **${IDENT}** — assignée à ABL Product Manager pour triage (company *Superpowers Dev Shop*)."
