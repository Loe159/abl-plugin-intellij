name: Sync GitHub Issue → Paperclip

on:
  issues:
    types: [opened, reopened]

env:
  PAPERCLIP_API: http://localhost:3100/api
  COMPANY_ID: 01420bc5-12ec-4b56-bf6a-2d420be0b2d5
  PROJECT_ID: cefe7156-21f5-4e8c-bf50-ee9101ccad2c
  # ABL CEO — receives GitHub issues, triages, and spawns the pipeline.
  CEO_AGENT_ID: 6c93a3f6-af4b-432c-b12b-46ef7b2cb011

jobs:
  sync:
    runs-on: [self-hosted, vps]
    steps:
      - name: Create Paperclip issue → ABL CEO
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_REPO: ${{ github.repository }}
        run: |
          PAYLOAD=$(jq -n \
            --arg title "$ISSUE_TITLE" \
            --arg num   "$ISSUE_NUMBER" \
            --arg url   "$ISSUE_URL" \
            --arg body  "$ISSUE_BODY" \
            --arg agent "$CEO_AGENT_ID" \
            --arg proj  "$PROJECT_ID" \
            '{
              title: $title,
              description: ("GitHub #" + $num + "\n\n" + $url + "\n\n---\n" + $body),
              projectId: $proj,
              assigneeAgentId: $agent,
              priority: "medium",
              status: "backlog"
            }')

          RESP=$(curl -s -X POST \
            "$PAPERCLIP_API/companies/$COMPANY_ID/issues" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          IDENT=$(echo "$RESP" | jq -r '.identifier // empty')
          if [ -z "$IDENT" ]; then
            echo "::error::Paperclip sync failed: $RESP"
            exit 1
          fi
          echo "Paperclip issue created: $IDENT"

          gh issue comment "$ISSUE_NUMBER" \
            --repo "$ISSUE_REPO" \
            --body "🤖 Paperclip **${IDENT}** — assigné à ABL CEO pour triage et orchestration du pipeline (company *Superpowers Dev Shop*)."
