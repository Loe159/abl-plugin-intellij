name: CI Failure → Paperclip CEO

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]

jobs:
  alert:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: [self-hosted, vps]
    steps:
      - name: Fire Paperclip CI-failure webhook
        run: |
          PAYLOAD=$(jq -n \
            --arg branch "${{ github.event.workflow_run.head_branch }}" \
            --arg sha    "${{ github.event.workflow_run.head_sha }}" \
            --arg url    "${{ github.event.workflow_run.html_url }}" \
            --arg repo   "${{ github.repository }}" \
            '{
              event: "ci_failure",
              branch: $branch,
              commit: $sha,
              runUrl: $url,
              repo: $repo
            }')
          curl -s -X POST \
            "http://127.0.0.1:3100/api/routine-triggers/public/0dde9f06d910aad160c949e0/fire" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer 3470662f818709c5b28761260bb8b0eee6f331de3a110fdd" \
            -d "$PAYLOAD" | jq '{status: .status, routineRunId: .routineRunId}'
